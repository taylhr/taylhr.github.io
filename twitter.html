<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/at.svg" />
  <title>twitter???</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rubik:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main>
    <h1>son im crine</h1>

    <img src="aibaby2.jpg" alt="son im crine" class="image-placeholder" />

    <p class="image-caption">twitter in the big [CURRENT_YEAR]</p>
  </main>
  <audio id="bg-music" src="stank.mp3" autoplay></audio>
  <script>
  window.addEventListener('load', () => {
    const audio = document.getElementById('bg-music');
    audio.play().catch(error => {
      console.log("Autoplay was blocked. Waiting for user interaction.");
    });
  });
</script>
  <script>
    (function () {
      var caption = document.querySelector('.image-caption');
      if (!caption) return;
      var year = String(new Date().getFullYear()).slice(-2);
      caption.textContent = 'twitter in the big ' + year + ' 😭😭😭';
    })();
  </script>
</body>
</html>
